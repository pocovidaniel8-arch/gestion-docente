  window.importar = async function() {
    const btn = document.getElementById("btn");
    const log = document.getElementById("log");
    btn.disabled = true;
    btn.textContent = "Importando...";
    log.innerHTML = "";

    let ok = 0, err = 0;
    for (const d of DOCENTES) {
      try {
        await setDoc(doc(db, COLECCION, d.docente), d, { merge: true });
        log.innerHTML += `<p style="color:green">✅ ${d.docente}</p>`;
        ok++;
      } catch(e) {
        log.innerHTML += `<p style="color:red">❌ ${d.docente} — ${e.message}</p>`;
        err++;
      }
    }

    btn.textContent = "Importar docentes";
    btn.disabled = false;
    log.innerHTML += `<hr><p><strong>Listo: ${ok} importados, ${err} errores.</strong></p>`;
